name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode google-services / signing (optional)
        # 在仓库 Secrets 中配置 BASE64_KEYSTORE 后取消注释以产出签名 Release AAB
        if: false
        run: echo "${{ secrets.BASE64_KEYSTORE }}" | base64 -d > release.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: thytrack-debug-apk
          path: app/build/outputs/apk/debug/*.apk
